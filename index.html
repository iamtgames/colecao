  .card:hover{border-color: rgba(255,255,255,0.4); transform: translateY(-3px); box-shadow: 0 16px 36px rgba(0,0,0,0.5);}

    border-radius: 18px 18px 0 0;

    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.55) 100%);

  }

let favoritos = JSON.parse(localStorage.getItem('favoritos_ps4')) || [];
let filtroAtivo = 'all';
let plataformaAtiva = 'all';
let termoBusca = '';

const catLabel = { exclusivo:"Exclusivo", aaa:"AAA", fps:"FPS", survival:"Survival", esporte:"Esporte", infantil:"Infantil", raro:"Raro" };
const rarClass = { comum:"b-comum", pouco:"b-pouco", raro:"b-raro", muito:"b-muito" };
const rarLabel = { comum:"Comum", pouco:"Pouco comum", raro:"Raro", muito:"Muito raro" };

function gerarLink(nome, plat){
  return `https://lista.mercadolivre.com.br/${encodeURIComponent(nome)}+${plat}`;
}

function render(){
  const grid = document.getElementById('grid');
  const termo = termoBusca.toLowerCase().trim();
  let html = '';
  let visiveis = 0, soma = 0;

  for(const j of jogos){
    if(!j.n.toLowerCase().includes(termo)) continue;
    if(filtroAtivo !== 'all' && j.cat !== filtroAtivo) continue;
    if(plataformaAtiva !== 'all' && j.plat !== plataformaAtiva) continue;
    visiveis++; soma += j.col;

    const isFav = favoritos.includes(j.id) ? 'active' : '';
    const capaUrl = capas[j.id];
    const inicial = j.n.charAt(0).toUpperCase();
    const coverInner = capaUrl
      ? `<img src="${capaUrl}" alt="${j.n}">`
      : `<div class="cover-fallback"><span class="ini">${inicial}</span><span class="tag">sem capa ainda</span></div>`;

    html += `
      <div class="card">
        <div class="cover-wrap">
          <span class="plat-chip">${j.plat}</span>
          <button class="fav-btn ${isFav}" data-id="${j.id}">⭐</button>
          ${coverInner}
        </div>
        <div class="card-body">
          <h3>${j.n}</h3>
          <div class="badges">
            <span class="badge ${rarClass[j.rar]}">${rarLabel[j.rar]}</span>
            <span class="badge b-pouco">${catLabel[j.cat]}</span>
            ${j.v ? '<span class="badge" style="background:rgba(79,178,134,.2);color:#4fb286;">✓ preço verificado</span>' : '<span class="badge" style="background:rgba(255,255,255,.06);color:var(--ink-dim);">preço a confirmar</span>'}
          </div>
          <div class="prices">
            <div><span class="v">R$ ${j.col}</span><span class="l">Colecionador</span></div>
            <div><span class="v">R$ ${j.bar}</span><span class="l">Venda rápida</span></div>
          </div>
          <div class="card-foot">
            <a href="${gerarLink(j.n, j.plat)}" target="_blank">Ver no Mercado Livre →</a>
          </div>
        </div>
      </div>
    `;
  }

  grid.innerHTML = html;
  document.getElementById('resultCount').textContent = `${visiveis} jogos exibidos`;
  document.getElementById('statTotal').textContent = jogos.length;
  document.getElementById('statValor').textContent = `R$ ${jogos.reduce((s,j)=>s+j.col,0)}`;
  document.getElementById('statUsado').textContent = `R$ ${jogos.reduce((s,j)=>s+j.loj,0)}`;
  document.getElementById('statFav').textContent = favoritos.length;

  document.querySelectorAll('.fav-btn').forEach(btn=>{
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      const id = parseInt(this.dataset.id);
      const idx = favoritos.indexOf(id);
      if(idx>-1) favoritos.splice(idx,1); else favoritos.push(id);
      localStorage.setItem('favoritos_ps4', JSON.stringify(favoritos));
      render();
    });
  });
}

document.getElementById('searchInput').addEventListener('input', function(){
  termoBusca = this.value; render();
});
document.querySelectorAll('#filterContainer button').forEach(btn=>{
  btn.addEventListener('click', function(){
    document.querySelectorAll('#filterContainer button').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    filtroAtivo = this.dataset.filter;
    render();
  });
});
document.querySelectorAll('#platContainer button').forEach(btn=>{
  btn.addEventListener('click', function(){
    document.querySelectorAll('#platContainer button').forEach(b=>b.classList.remove('active'));
    this.classList.add('active');
    plataformaAtiva = this.dataset.plat;
    render();
  });
});

render();
</script>
