# DESATIVADO por enquanto: a API publica do Mercado Livre esta bloqueando
# buscas anonimas vindas de IP de datacenter (GitHub Actions) com erro 403
# "PA_UNAUTHORIZED_RESULT_FROM_POLICIES" (confirmado em 23/07/2026, 3 tentativas
# diferentes). Por isso o gatilho automatico (cron) foi removido — rodar isso
# todo dia so gastaria minutos do Actions pra sempre retornar 0 precos.
# So workflow_dispatch (manual) fica ativo, caso um dia voce registre um app
# OAuth aprovado no Mercado Livre e queira testar de novo.
name: Checar precos do Radar de Caca

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checar-precos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checar precos no Mercado Livre e gerar precos.json
        run: node scripts/check-precos.js

      - name: Commitar mudancas (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add precos.json
          git diff --staged --quiet || git commit -m "Atualiza precos do Radar de Caca (automatico)"
          git push
