name: Atualizar noticias (Flow Games)

on:
  schedule:
    - cron: '0 9,21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Buscar feed e gerar news.json
        run: node scripts/fetch-news.js

      - name: Commitar mudancas (se houver)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "Atualiza noticias (automatico)"
          git push
